name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            website/package-lock.json

      - name: Install and verify playbook app
        working-directory: app
        run: |
          npm ci
          npm run lint
          npm run test:coverage
          npm run build

      - name: Install and build blog
        working-directory: website
        run: |
          npm ci
          npm run build
          npm run typecheck

      - name: Merge blog into playbook dist
        run: |
          mkdir -p app/dist/blog
          cp -R website/build/. app/dist/blog/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
